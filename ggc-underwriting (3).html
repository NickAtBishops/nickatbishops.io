<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gary Group Capital · Underwriting</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a0f2e;
      --navy-mid: #111836;
      --navy-light: #1a2448;
      --navy-card: #141b3d;
      --blue: #1e40af;
      --blue-bright: #3b82f6;
      --blue-glow: #60a5fa;
      --gold: #c9a84c;
      --gold-light: #e4c97e;
      --white: #f0f4ff;
      --muted: #8892b0;
      --border: rgba(59, 130, 246, 0.18);
      --success: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
    }

    html, body { height: 100%; background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; }

    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(10,15,46,0.98) 0%, rgba(10,15,46,0.85) 100%);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
    .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }
    /* MAIN LAYOUT */
    .main { flex: 1; padding: 48px; max-width: 1200px; margin: 0 auto; width: 100%; }

    /* HERO */
    .hero { margin-bottom: 48px; }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px; font-weight: 700;
      background: linear-gradient(135deg, var(--white) 0%, var(--blue-glow) 60%, var(--gold-light) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.15; margin-bottom: 12px;
    }
    .hero p { color: var(--muted); font-size: 16px; font-weight: 300; max-width: 580px; line-height: 1.6; }

    /* UPLOAD ZONE */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 56px 40px;
      text-align: center;
      background: linear-gradient(135deg, rgba(17,24,56,0.6), rgba(20,27,61,0.4));
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative; overflow: hidden;
    }
    .upload-zone::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--blue-bright);
      background: linear-gradient(135deg, rgba(30,64,175,0.15), rgba(17,24,56,0.6));
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(59,130,246,0.15);
    }
    .upload-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: linear-gradient(135deg, rgba(30,64,175,0.3), rgba(59,130,246,0.2));
      border-radius: 16px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .upload-zone h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .upload-zone p { color: var(--muted); font-size: 14px; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* FILE LOADED */
    .file-loaded {
      display: flex; align-items: center; gap: 16px;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 12px; padding: 16px 24px;
      margin-top: 16px;
    }
    .file-icon { font-size: 28px; }
    .file-name { font-weight: 500; font-size: 15px; }
    .file-size { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ANALYZE BUTTON */
    .btn-analyze {
      margin-top: 24px;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-bright) 100%);
      border: none; border-radius: 12px;
      color: white; font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 600; letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 24px rgba(59,130,246,0.35);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(59,130,246,0.5);
    }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* LOADING */
    .loading-state {
      text-align: center; padding: 48px 24px;
    }
    .spinner {
      width: 48px; height: 48px; margin: 0 auto 20px;
      border: 3px solid rgba(59,130,246,0.2);
      border-top-color: var(--blue-bright);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: var(--muted); font-size: 15px; }
    .loading-state .step { color: var(--blue-glow); font-weight: 500; margin-top: 8px; font-size: 14px; }

    /* RESULTS */
    .results { animation: fadeUp 0.5s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .results-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; }
    .results-header .meta { font-size: 13px; color: var(--muted); }
    .btn-reset {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; padding: 8px 18px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { border-color: var(--blue-bright); color: var(--white); }

    /* KPI GRID */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .kpi-card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
      position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(59,130,246,0.12); }
    .kpi-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--blue-bright), transparent);
    }
    .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .kpi-value { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--white); }
    .kpi-value.positive { color: var(--success); }
    .kpi-value.gold { color: var(--gold-light); }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* SECTIONS */
    .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 768px) { .section-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 24px;
    }
    .card h3 {
      font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--blue-glow); margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-full { grid-column: 1 / -1; }

    /* TABLE */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .data-table tr:last-child { border-bottom: none; }
    .data-table td { padding: 10px 0; font-size: 14px; }
    .data-table td:first-child { color: var(--muted); }
    .data-table td:last-child { text-align: right; font-family: 'DM Mono', monospace; font-weight: 500; }

    /* FLAGS */
    .flag { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .flag:last-child { border-bottom: none; }
    .flag-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .flag-dot.red { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    .flag-dot.yellow { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
    .flag-dot.green { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .flag-text { font-size: 14px; line-height: 1.5; }
    .flag-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .flag-label.red { color: var(--danger); }
    .flag-label.yellow { color: var(--warn); }
    .flag-label.green { color: var(--success); }

    /* PRO FORMA TABLE */
    .proforma { overflow-x: auto; }
    .proforma-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
    .proforma-table th {
      padding: 10px 14px; text-align: right; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    .proforma-table th:first-child { text-align: left; }
    .proforma-table td { padding: 9px 14px; text-align: right; font-family: 'DM Mono', monospace; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .proforma-table td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; color: var(--muted); font-family: unset; }
    .proforma-table .row-highlight td { color: var(--white); font-weight: 600; background: rgba(59,130,246,0.07); }
    .proforma-table .row-noi td { color: var(--gold-light); font-weight: 600; }

    /* SUMMARY NARRATIVE */
    .narrative {
      font-size: 15px; line-height: 1.8; color: rgba(240,244,255,0.85);
      background: linear-gradient(135deg, rgba(17,24,56,0.5), rgba(20,27,61,0.3));
      border: 1px solid var(--border); border-left: 3px solid var(--blue-bright);
      border-radius: 12px; padding: 24px 28px;
      margin-bottom: 20px;
    }

    /* ERROR */
    .error-box {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px; padding: 20px 24px; color: #fca5a5; font-size: 14px;
    }

    /* FOOTER */
    .footer { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }

    /* STEP INDICATOR */
    .steps { display: flex; gap: 8px; margin-bottom: 32px; }
    .step-item {
      display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted);
      padding: 8px 16px; border-radius: 20px; border: 1px solid transparent;
    }
    .step-item.active { color: var(--blue-glow); border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.06); }
    .step-item.done { color: var(--success); }
    .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--navy-light); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
    .step-item.active .step-num { background: var(--blue); color: white; }
    .step-item.done .step-num { background: var(--success); color: white; }

    .no-flags { color: var(--muted); font-size: 14px; font-style: italic; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

const SYSTEM_PROMPT = `You are an expert MHC (Manufactured Housing Community) and commercial real estate underwriter with deep experience at firms like Berkadia and PNC Real Estate. You analyze rent rolls and P&L statements for mobile home parks and RV campgrounds.

When given a document (rent roll, P&L, or investor deck), extract and return a JSON object with EXACTLY this structure. If a value cannot be determined, use null. Do not include any text outside the JSON.

{
  "propertyName": "string or null",
  "location": "string or null",
  "assetType": "MHC or RV or Mixed or null",
  "totalSites": number or null,
  "occupiedSites": number or null,
  "occupancyPct": number or null,
  "avgLotRent": number or null,
  "grossPotentialRent": number or null,
  "effectiveGrossIncome": number or null,
  "totalExpenses": number or null,
  "expenseRatio": number or null,
  "noi": number or null,
  "purchasePrice": number or null,
  "pricePerSite": number or null,
  "capRate": number or null,
  "debtAmount": number or null,
  "debtRate": number or null,
  "ltv": number or null,
  "projectedIRR": number or null,
  "projectedCoC": number or null,
  "equityMultiple": number or null,
  "holdPeriod": number or null,
  "pohPct": number or null,
  "proForma": [
    { "year": "UW", "noi": number or null, "occupancy": number or null, "avgRent": number or null },
    { "year": "Yr 1", "noi": number or null, "occupancy": number or null, "avgRent": number or null },
    { "year": "Yr 2", "noi": number or null, "occupancy": number or null, "avgRent": number or null },
    { "year": "Yr 3", "noi": number or null, "occupancy": number or null, "avgRent": number or null },
    { "year": "Yr 4", "noi": number or null, "occupancy": number or null, "avgRent": number or null },
    { "year": "Yr 5", "noi": number or null, "occupancy": number or null, "avgRent": number or null }
  ],
  "flags": [
    { "severity": "red|yellow|green", "category": "string", "text": "string" }
  ],
  "narrative": "2-3 sentence executive summary of the deal including key strengths and risks",
  "expenseLineItems": [
    { "name": "string", "amount": number }
  ]
}

For flags, identify:
- RED: Serious risks (very low DSCR, high POH%, major deferred maintenance, below-market occupancy with no clear plan, self-dealing expenses, suspicious financials)
- YELLOW: Watch items (above-average expense ratio, single large tenant concentration, lease expirations, market concerns)
- GREEN: Positive highlights (assumable debt, strong MSA, below-market rents with upside, infill opportunity)

Be thorough and flag anything a professional underwriter would note.`;

function formatCurrency(val) {
  if (val == null) return '—';
  if (val >= 1_000_000) return `$${(val / 1_000_000).toFixed(2)}M`;
  if (val >= 1_000) return `$${(val / 1_000).toFixed(0)}K`;
  return `$${val.toLocaleString()}`;
}
function formatPct(val) { return val == null ? '—' : `${val.toFixed(1)}%`; }
function formatNum(val) { return val == null ? '—' : val.toLocaleString(); }
function formatMono(val, prefix='$') {
  if (val == null) return '—';
  return `${prefix}${Math.round(val).toLocaleString()}`;
}

function KpiCard({ label, value, sub, variant }) {
  return (
    <div className="kpi-card">
      <div className="kpi-label">{label}</div>
      <div className={`kpi-value ${variant || ''}`}>{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

function ResultsView({ data, onReset, fileName }) {
  const d = data;
  return (
    <div className="results">
      <div className="results-header">
        <div>
          <h2>{d.propertyName || 'Property Analysis'}</h2>
          <div className="meta">{d.location || ''} {d.assetType ? `· ${d.assetType}` : ''} · Analyzed from {fileName}</div>
        </div>
        <button className="btn-reset" onClick={onReset}>↩ New Analysis</button>
      </div>

      {d.narrative && <div className="narrative">{d.narrative}</div>}

      {/* KPI Strip */}
      <div className="kpi-grid">
        <KpiCard label="Total Sites" value={formatNum(d.totalSites)} sub={`${formatNum(d.occupiedSites)} occupied`} />
        <KpiCard label="Occupancy" value={formatPct(d.occupancyPct)} variant={d.occupancyPct >= 90 ? 'positive' : d.occupancyPct >= 80 ? '' : 'gold'} />
        <KpiCard label="Avg Lot Rent" value={d.avgLotRent ? `$${Math.round(d.avgLotRent).toLocaleString()}` : '—'} />
        <KpiCard label="Current NOI" value={formatCurrency(d.noi)} />
        <KpiCard label="Purchase Price" value={formatCurrency(d.purchasePrice)} sub={d.pricePerSite ? `$${Math.round(d.pricePerSite).toLocaleString()}/site` : null} />
        <KpiCard label="Cap Rate" value={formatPct(d.capRate)} />
        <KpiCard label="Projected IRR" value={formatPct(d.projectedIRR)} variant="positive" />
        <KpiCard label="Equity Multiple" value={d.equityMultiple ? `${d.equityMultiple.toFixed(1)}x` : '—'} variant="gold" />
      </div>

      <div className="section-grid">
        {/* Deal Metrics */}
        <div className="card">
          <h3>📊 Deal Metrics</h3>
          <table className="data-table">
            <tbody>
              <tr><td>Gross Potential Rent</td><td>{formatCurrency(d.grossPotentialRent)}</td></tr>
              <tr><td>Effective Gross Income</td><td>{formatCurrency(d.effectiveGrossIncome)}</td></tr>
              <tr><td>Total Expenses</td><td>{formatCurrency(d.totalExpenses)}</td></tr>
              <tr><td>Expense Ratio</td><td>{formatPct(d.expenseRatio)}</td></tr>
              <tr><td>NOI</td><td>{formatCurrency(d.noi)}</td></tr>
              <tr><td>Avg Cash-on-Cash</td><td>{formatPct(d.projectedCoC)}</td></tr>
              <tr><td>Hold Period</td><td>{d.holdPeriod ? `${d.holdPeriod} Years` : '—'}</td></tr>
              <tr><td>POH %</td><td>{formatPct(d.pohPct)}</td></tr>
            </tbody>
          </table>
        </div>

        {/* Debt */}
        <div className="card">
          <h3>🏦 Debt & Capital</h3>
          <table className="data-table">
            <tbody>
              <tr><td>Debt Amount</td><td>{formatCurrency(d.debtAmount)}</td></tr>
              <tr><td>Interest Rate</td><td>{formatPct(d.debtRate)}</td></tr>
              <tr><td>LTV</td><td>{formatPct(d.ltv)}</td></tr>
              <tr><td>Purchase Price</td><td>{formatCurrency(d.purchasePrice)}</td></tr>
              <tr><td>Price / Site</td><td>{d.pricePerSite ? `$${Math.round(d.pricePerSite).toLocaleString()}` : '—'}</td></tr>
            </tbody>
          </table>
        </div>

        {/* Expense Breakdown */}
        {d.expenseLineItems && d.expenseLineItems.length > 0 && (
          <div className="card">
            <h3>💼 Expense Breakdown</h3>
            <table className="data-table">
              <tbody>
                {d.expenseLineItems.map((e, i) => (
                  <tr key={i}><td>{e.name}</td><td>{formatCurrency(e.amount)}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {/* Flags */}
        <div className="card">
          <h3>🚩 Underwriting Flags</h3>
          {(!d.flags || d.flags.length === 0) ? (
            <div className="no-flags">No material flags identified.</div>
          ) : d.flags.map((f, i) => (
            <div className="flag" key={i}>
              <div className={`flag-dot ${f.severity}`}></div>
              <div className="flag-text">
                <div className={`flag-label ${f.severity}`}>{f.severity.toUpperCase()} · {f.category}</div>
                {f.text}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Pro Forma */}
      {d.proForma && d.proForma.some(r => r.noi != null) && (
        <div className="card card-full">
          <h3>📈 5-Year Pro Forma</h3>
          <div className="proforma">
            <table className="proforma-table">
              <thead>
                <tr>
                  <th></th>
                  {d.proForma.map(r => <th key={r.year}>{r.year}</th>)}
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Occupancy</td>
                  {d.proForma.map(r => <td key={r.year}>{r.occupancy != null ? `${r.occupancy}%` : '—'}</td>)}
                </tr>
                <tr>
                  <td>Avg Lot Rent</td>
                  {d.proForma.map(r => <td key={r.year}>{r.avgRent != null ? `$${Math.round(r.avgRent).toLocaleString()}` : '—'}</td>)}
                </tr>
                <tr className="row-noi">
                  <td>Net Operating Income</td>
                  {d.proForma.map(r => <td key={r.year}>{r.noi != null ? `$${Math.round(r.noi).toLocaleString()}` : '—'}</td>)}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [file, setFile] = useState(null);
  const [fileData, setFileData] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [loading, setLoading] = useState(false);
  const [loadingStep, setLoadingStep] = useState('');
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const inputRef = useRef();

  const currentStep = result ? 3 : file ? 2 : 1;

  const readFile = (f) => {
    return new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(f);
    });
  };

  const handleFile = async (f) => {
    if (!f) return;
    if (f.type !== 'application/pdf') { setError('Please upload a PDF file.'); return; }
    setFile(f);
    setError(null);
    setResult(null);
    const b64 = await readFile(f);
    setFileData(b64);
  };

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  }, []);

  const analyze = async () => {
    if (!fileData) return;
    setLoading(true);
    setError(null);
    setResult(null);

    try {
      setLoadingStep('Reading document...');
      await new Promise(r => setTimeout(r, 600));
      setLoadingStep('Extracting financial data...');

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          system: SYSTEM_PROMPT,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'document',
                source: { type: 'base64', media_type: 'application/pdf', data: fileData }
              },
              {
                type: 'text',
                text: 'Please analyze this document and return the JSON underwriting summary as instructed.'
              }
            ]
          }]
        })
      });

      setLoadingStep('Running underwriting analysis...');
      await new Promise(r => setTimeout(r, 400));

      const data = await response.json();

      if (data.error) throw new Error(data.error.message);

      const text = data.content.map(c => c.text || '').join('');
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('Could not parse underwriting output. Try a cleaner PDF.');

      setLoadingStep('Generating summary...');
      await new Promise(r => setTimeout(r, 300));

      const parsed = JSON.parse(jsonMatch[0]);
      setResult(parsed);

    } catch (e) {
      setError(e.message || 'Analysis failed. Please try again.');
    } finally {
      setLoading(false);
      setLoadingStep('');
    }
  };

  return (
    <>
      <header className="header">
        <div className="logo">
          <div>
            <div className="logo-text">Gary Group Capital</div>
            <div className="logo-sub">Underwriting Analysis</div>
          </div>
        </div>
      </header>

      <main className="main">
        {!result && (
          <>
            <div className="hero">
              <h1>MHC & RV<br />Underwriting Analysis</h1>
              <p>Upload a rent roll, P&L, or investor deck. Key figures are extracted and structured into a full underwriting summary with risk flags and pro forma projections.</p>
            </div>

            <div className="steps">
              <div className={`step-item ${currentStep === 1 ? 'active' : currentStep > 1 ? 'done' : ''}`}>
                <div className="step-num">{currentStep > 1 ? '✓' : '1'}</div> Upload Document
              </div>
              <div style={{color:'var(--border)',alignSelf:'center'}}>→</div>
              <div className={`step-item ${currentStep === 2 ? 'active' : currentStep > 2 ? 'done' : ''}`}>
                <div className="step-num">{currentStep > 2 ? '✓' : '2'}</div> Analyze
              </div>
              <div style={{color:'var(--border)',alignSelf:'center'}}>→</div>
              <div className={`step-item ${currentStep === 3 ? 'active' : ''}`}>
                <div className="step-num">3</div> Review Summary
              </div>
            </div>

            {!loading && (
              <>
                <div
                  className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
                  onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={handleDrop}
                  onClick={() => !file && inputRef.current.click()}
                >
                  <input
                    ref={inputRef} type="file" accept=".pdf"
                    onChange={(e) => handleFile(e.target.files[0])}
                  />
                  <div className="upload-icon">📄</div>
                  <h3>{file ? 'Document Loaded' : 'Drop your PDF here'}</h3>
                  <p>{file ? 'Click Analyze to run underwriting' : 'Rent roll, P&L statement, or investor deck · PDF only'}</p>
                </div>

                {file && (
                  <div className="file-loaded">
                    <div className="file-icon">📋</div>
                    <div>
                      <div className="file-name">{file.name}</div>
                      <div className="file-size">{(file.size / 1024).toFixed(0)} KB · Ready for analysis</div>
                    </div>
                  </div>
                )}

                {error && <div className="error-box" style={{marginTop:16}}>⚠ {error}</div>}

                <button className="btn-analyze" disabled={!file} onClick={analyze}>
                  ⚡ Analyze Document
                </button>
              </>
            )}

            {loading && (
              <div className="loading-state">
                <div className="spinner"></div>
                <p>Processing document</p>
                <div className="step">{loadingStep}</div>
              </div>
            )}
          </>
        )}

        {result && (
          <ResultsView data={result} onReset={() => { setResult(null); setFile(null); setFileData(null); }} fileName={file?.name} />
        )}
      </main>

      <footer className="footer">
        Gary Group Capital · Underwriting Analysis · Internal Use Only
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
